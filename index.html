<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calculator - SL/Entry</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #f8fafc;
        }
        .card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        h2 { text-align: center; color: #fbbf24; margin-bottom: 20px; font-weight: 500; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            background: #0f172a;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: #fbbf24; box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
        
        .result-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .result-box {
            padding: 15px;
            background-color: #0f172a;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
        }
        .highlight-green { border-color: #22c55e; }
        .highlight-yellow { border-color: #fbbf24; }
        .highlight-blue { border-color: #38bdf8; }
        .result-label { color: #94a3b8; font-size: 0.75rem; margin-bottom: 5px; }
        .result-value { font-size: 1.2rem; font-weight: bold; }

        /* สไตล์ปุ่ม Clear */
        .clear-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Trading Calc </h2>
    
    <div class="input-group full-width">
        <label>USDT (Risk Amount)</label>
        <label>(จำนวนขาดทุนUSDTที่รับได้)</label>
        <input type="number" id="usdt" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="input-grid">
        <div class="input-group">
            <label>Entry Price (ราคาเข้าซื้อ)</label>
            <input type="number" id="entry" placeholder="0.00" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Stop Loss (SL)</label>
            <input type="number" id="sl" placeholder="0.00" oninput="calculate()">
        </div>
    </div>

    <div class="input-group full-width">
        <label>Take Profit (TP) - Optional</label>
        <input type="number" id="tp" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="result-container">
        <div class="result-box highlight-green">
            <div class="result-label">Position Size</div>
            <div class="result-label">(จำนวนเงินต้น (USDT))</div>
            <div id="pos-size" class="result-value">0.00</div>
        </div>
        <div class="result-box highlight-yellow">
            <div class="result-label">RR Ratio</div>
            <div id="rr-ratio" class="result-value">0.00 : 1</div>
        </div>
        <div class="result-box highlight-blue full-width">
            <div class="result-label">Estimated Profit (USDT)</div>
            <div class="result-label">กำไร (USDT)</div>
            <div id="profit" class="result-value" style="color: #38bdf8;">0.00</div>
        </div>
    </div>

    <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<script>
    function calculate() {
        const usdt = parseFloat(document.getElementById('usdt').value);
        const entry = parseFloat(document.getElementById('entry').value);
        const sl = parseFloat(document.getElementById('sl').value);
        const tp = parseFloat(document.getElementById('tp').value);

        const posDisplay = document.getElementById('pos-size');
        const rrDisplay = document.getElementById('rr-ratio');
        const profitDisplay = document.getElementById('profit');

        // คำนวณ Position Size
        if (usdt && entry && sl && entry !== sl) {
            const riskPerUnit = Math.abs(entry - sl);
            const totalUnits = usdt / riskPerUnit;
            const totalValue = totalUnits * entry;
            
            posDisplay.innerText = totalValue.toLocaleString(undefined, {
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2
            });
        } else {
            posDisplay.innerText = "0.00";
        }

        // คำนวณ RR Ratio และ Profit
        if (entry && sl && tp && entry !== sl) {
            const risk = Math.abs(entry - sl);
            const reward = Math.abs(tp - entry);
            const rr = reward / risk;
            
            rrDisplay.innerText = rr.toFixed(2) + " : 1";

            if (usdt) {
                const estimatedProfit = rr * usdt;
                profitDisplay.innerText = "+" + estimatedProfit.toLocaleString(undefined, {
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2
                });
            } else {
                profitDisplay.innerText = "0.00";
            }
        } else {
            rrDisplay.innerText = "0.00 : 1";
            profitDisplay.innerText = "0.00";
        }
    }

    // ฟังก์ชันล้างค่า
    function clearAll() {
        // ล้างค่าใน input
        document.getElementById('usdt').value = '';
        document.getElementById('entry').value = '';
        document.getElementById('sl').value = '';
        document.getElementById('tp').value = '';
        
        // รีเซ็ตการแสดงผล
        document.getElementById('pos-size').innerText = "0.00";
        document.getElementById('rr-ratio').innerText = "0.00 : 1";
        document.getElementById('profit').innerText = "0.00";
    }
</script>

</body>
</html>
