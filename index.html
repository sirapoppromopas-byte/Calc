<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #f8fafc;
        }
        .card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; font-weight: 500; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: #94a3b8; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            background: #0f172a;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        
        .result-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .result-box {
            padding: 15px;
            background-color: #0f172a;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
        }
        .highlight-green { border-color: #22c55e; }
        .highlight-blue { border-color: #38bdf8; }
        .result-label { color: #94a3b8; font-size: 0.75rem; margin-bottom: 5px; }
        .result-value { font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Trading Tool</h2>
    
    <div class="input-group full-width">
        <label>USDT (Risk Amount)</label>
        <input type="number" id="usdt" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="input-grid">
        <div class="input-group">
            <label>Entry Price</label>
            <input type="number" id="entry" placeholder="0.00" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Stop Loss (SL)</label>
            <input type="number" id="sl" placeholder="0.00" oninput="calculate()">
        </div>
    </div>

    <div class="input-group full-width">
        <label>Take Profit (TP) - <small>Optional</small></label>
        <input type="number" id="tp" placeholder="ใส่เพื่อคำนวณ RR" oninput="calculate()">
    </div>

    <div class="result-container">
        <div class="result-box highlight-green">
            <div class="result-label">Position Size</div>
            <div id="pos-size" class="result-value">0.00</div>
        </div>
        <div class="result-box highlight-blue">
            <div class="result-label">R:R Ratio</div>
            <div id="rr-ratio" class="result-value">0.00 : 1</div>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const usdt = parseFloat(document.getElementById('usdt').value);
        const entry = parseFloat(document.getElementById('entry').value);
        const sl = parseFloat(document.getElementById('sl').value);
        const tp = parseFloat(document.getElementById('tp').value);

        const posDisplay = document.getElementById('pos-size');
        const rrDisplay = document.getElementById('rr-ratio');

        // 1. คำนวณ Position Size (สูตรเดิมของคุณ)
        if (usdt && entry && sl && sl !== 0) {
            const denominator = 1 - (entry / sl);
            if (denominator !== 0) {
                const total = usdt / denominator;
                posDisplay.innerText = Math.abs(total).toLocaleString(undefined, {
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2
                });
            } else {
                posDisplay.innerText = "Error";
            }
        } else {
            posDisplay.innerText = "0.00";
        }

        // 2. คำนวณ R:R Ratio (ถ้ามีการกรอก TP)
        // สูตร RR = ระยะกำไร (TP-Entry) / ระยะขาดทุน (Entry-SL)
        if (entry && sl && tp) {
            const profitDist = Math.abs(tp - entry);
            const lossDist = Math.abs(entry - sl);
            
            if (lossDist !== 0) {
                const rr = profitDist / lossDist;
                rrDisplay.innerText = rr.toFixed(2) + " : 1";
            } else {
                rrDisplay.innerText = "0.00 : 1";
            }
        } else {
            rrDisplay.innerText = "0.00 : 1";
        }
    }
</script>

</body>
</html>
